<!DOCTYPE html>
<html>
<head>
    <title>Departments</title>
</head>
<body>

<h1>Department List</h1>

<p>
    <a href="/departments/create/">
        ➕ Add Department
    </a>
</p>

<table border="1" cellpadding="10">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Code</th>
        <th>Head</th>
        <th>Action</th>
    </tr>

    {% for department in departments %}

    <tr>
        <td>{{ department.id }}</td>
        <td>{{ department.name }}</td>
        <td>{{ department.code }}</td>
        <td>{{ department.head }}</td>

        <td>
            <a href="{% url 'edit_department' department.id %}">
                Edit
            </a>

            |

            <a href="{% url 'delete_department' department.id %}">
                Delete
            </a>
        </td>
    </tr>

    {% empty %}

    <tr>
        <td colspan="5">
            No Department Found.
        </td>
    </tr>

    {% endfor %}

</table>

<br>

<a href="/">
    Back to Dashboard
</a>

</body>
</html>
