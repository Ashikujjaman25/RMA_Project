<!DOCTYPE html>
<html>
<head>

    <title>Update My Profile</title>

    <style>

        body{
            font-family: Arial;
            width:700px;
            margin:40px auto;
        }

        form{
            border:1px solid #ddd;
            padding:20px;
            border-radius:5px;
        }

        p{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:8px;
            box-sizing:border-box;
        }

        button{
            padding:8px 16px;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            margin-left:15px;
        }

    </style>

</head>

<body>

<h2>Update My Profile</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Changes
    </button>

    <a href="{% url 'my_profile' %}">
        Cancel
    </a>

</form>

</body>
</html>
