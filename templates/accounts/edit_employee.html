<!DOCTYPE html>
<html>
<head>

    <title>Edit Employee</title>

    <style>

        body{
            font-family:Arial;
            width:500px;
            margin:40px auto;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
        }

    </style>

</head>

<body>

<h2>Edit Employee</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Update Employee
    </button>

</form>

<br>

<a href="{% url 'employee_list' %}">
    Back to Employee List
</a>

</body>
</html>
